name: Build Bizaar Browser IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Download ffmpeg-kit xcframeworks
        run: |
          mkdir -p Frameworks
          cd /tmp
          git clone --depth 1 --filter=blob:none --sparse https://github.com/luthviar/ffmpeg-kit-ios-full.git
          cd ffmpeg-kit-ios-full
          git sparse-checkout set ffmpeg-kit-ios-full
          cp -R ffmpeg-kit-ios-full/*.xcframework "${GITHUB_WORKSPACE}/Frameworks/"

      - name: Verify frameworks
        run: ls -la Frameworks/

      - name: Build iOS app
        run: |
          xcodebuild \
            -project BizaarBrowser.xcodeproj \
            -scheme BizaarBrowser \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Create IPA
        run: |
          mkdir -p ipa/Payload
          APP_PATH=$(find build -name "BizaarBrowser.app" -type d | head -1)
          cp -R "$APP_PATH" ipa/Payload/
          cd ipa && zip -r ../BizaarBrowser.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BizaarBrowser-IPA
          path: BizaarBrowser.ipa
          retention-days: 30
